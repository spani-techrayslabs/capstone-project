<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>

    <link rel="stylesheet" href="/Frontend/dist/output.css">

</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-xl shadow-lg max-w-4xl grid grid-cols-1 md:grid-cols-2 overflow-hidden">

    
        <div class="p-10">

            <h2 class="text-3xl font-bold mb-2">Deposito <br>Welcomes you</h2>

            <p class="text-gray-500 mb-8">Hey, welcome back to your special place</p>

            <form id="loginForm" class="space-y-4">

                <input id="email" type="email" placeholder="Email"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    required />

                <input id="password" type="password" placeholder="Password"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    required />

                <p id="passwordError" class="text-red-500 text-sm hidden"></p>

                <div class="flex justify-between items-center text-sm">

                    <label class="flex items-center gap-2">
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#" class="text-amber-500">Forgot Password?</a>

                </div>

                <button type="submit"
                    class="w-full bg-amber-400 text-white py-3 rounded-lg hover:bg-amber-600 transition">
                    Sign In
                </button>

                <p id="successMsg" class="text-green-600 text-sm hidden"></p>

            </form>

            <p class="mt-6 text-sm">
                Don't have an account?
                <a href="#" class="text-amber-500 font-semibold">Sign Up</a>
            </p>

        </div>

       
        <div class="hidden md:flex items-center justify-center bg-indigo-200">

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTknrUSuOLqk7R1EOTrA1y7BSQUDXQRLdqqQA&s" class="h-[100%]" />

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
